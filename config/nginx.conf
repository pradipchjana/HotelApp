events {}

http {

    upstream user_service {
        server user-service:8000;
    }

    upstream search_service {
        server search-service:8001;
    }

    upstream booking_service {
        server booking-service:8002;
    }

    server {
        listen 80;

        location /api/users/ {
            proxy_pass http://user_service/api/users/;
        }

        location /api/search/ {
            proxy_pass http://search_service/api/search/;
        }

        location /api/bookings {
            proxy_pass http://booking_service/api/bookings;
        }

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}