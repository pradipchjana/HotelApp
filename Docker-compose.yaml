services:

  nginx:
    image: nginx:latest
    container_name: nginx-gateway
    ports:
      - "3000:80"
    volumes:
        - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service
      - search-service
      - booking-service

  user-service:
    build:
      context: ./services/user-service
    container_name: user-service
    ports:
      - "8000:8000"
    environment:
      SERVER_PORT: 8000
      MONGODB_URI: mongodb://mongodb:27017/userdb
      JWT_SECRET: mysecret
    depends_on:
      - mongodb

  search-service:
    build:
      context: ./services/hotel-service
    container_name: search-service
    ports:
      - "8001:8001"
    environment:
      SERVER_PORT: 8001
      MONGODB_URI: mongodb://mongodb:27017/searchdb
      JWT_SECRET: mysecret
    depends_on:
      - mongodb

  booking-service:
    build:
      context: ./services/booking-service
    container_name: booking-service
    ports:
      - "8002:8002"
    environment:
      PORT: 8002
      MONGODB_URI: mongodb://mongodb:27017/bookingdb
      JWT_SECRET: mysecret
    depends_on:
      - mongodb

  mongodb:
    image: mongo:8
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: