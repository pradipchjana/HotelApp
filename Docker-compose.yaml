services:
  server:
    build: .
    expose:
      - "3000"
    environment:
      MONGODB_URI: mongodb://mongo:27017/test
    depends_on:
      - mongo
    networks:
      - backend

  mongo:
    image: mongo:7
    container_name: mongodb
    volumes:
      - mongo_data:/data/db
    networks:
      - backend

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "3000:80"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - server
    networks:
      - backend

volumes:
  mongo_data:

networks:
  backend:
    driver: bridge