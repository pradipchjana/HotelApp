services:

  nginx:
    image: nginx:latest
    container_name: nginx-gateway
    ports:
      - "3000:80"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service
      - search-service
      - booking-service
    networks:
      - hotel-network

  user-service:
    build:
      context: ./services/user-service
    container_name: user-service
    expose:
      - "8000"
    environment:
      SERVER_PORT: 8000
      MONGODB_URI: mongodb://mongodb:27017/userdb
      JWT_SECRET: "ourhotelappmadebykhasimjanadinesh"
    depends_on:
      - mongodb
    networks:
      - hotel-network

  search-service:
    build:
      context: ./services/hotel-service
    container_name: search-service
    expose:
       - "8001"
    environment:
      SERVER_PORT: 8001
      MONGODB_URI: mongodb://mongodb:27017/searchdb
      JWT_SECRET: "ourhotelappmadebykhasimjanadinesh"
    depends_on:
      - mongodb
    networks:
      - hotel-network

  booking-service:
    build:
      context: ./services/booking-service
    container_name: booking-service
    expose:
      - "8002"
    environment:
      PORT: 8002
      MONGODB_URI: mongodb://mongodb:27017/bookingdb
      JWT_SECRET: "ourhotelappmadebykhasimjanadinesh"
    depends_on:
      - mongodb
      - search-service
    networks:
      - hotel-network

  mongodb:
    image: mongo:8
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - hotel-network

volumes:
  mongo_data:

networks:
  hotel-network:
    driver: bridge